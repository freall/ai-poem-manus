  <text x="110" y="410" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">夜莺啼绿柳，皓月醒长空。最爱</text><text x="110" y="464" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">垄头麦，迎风笑落红。</text>
  <text x="110" y="640" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#8a6f5d">配图提示词</text>
  <text x="110" y="690" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">夏日风景，荷花池塘，炎热的天气，蝉鸣</text><text x="110" y="728" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">，垂柳，柔和的风格，儿童插画风格，明</text><text x="110" y="766" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">亮色彩</text>
  <text x="110" y="795" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#9a8578">本地静态插画卡片 · GitHub Pages</text>
