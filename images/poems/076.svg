      <stop offset="0%" stop-color="#ff7aa2"/>
      <stop offset="55%" stop-color="#ffd0da"/>
      <stop offset="100%" stop-color="#fff1dc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1020" cy="150" r="130" fill="#ffffff" fill-opacity="0.28"/>
  <circle cx="170" cy="760" r="180" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="70" y="70" width="1060" height="760" rx="36" fill="#ffffff" fill-opacity="0.72"/>
  <rect x="110" y="110" width="210" height="56" rx="28" fill="#ffffff" fill-opacity="0.9"/>
  <text x="215" y="146" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6b4f3a">重阳节</text>
  <text x="110" y="255" font-size="78" font-weight="700" font-family="STKaiti, KaiTi, serif" fill="#3a2c24">醉花阴·薄雾浓云愁永昼</text>
  <text x="110" y="320" font-size="34" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#7a5a46">李清照 · 宋</text>
  <text x="110" y="410" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">薄雾浓云愁永昼，瑞脑销金兽。</text><text x="110" y="464" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">佳节又重阳，玉枕纱厨，半夜凉</text><text x="110" y="518" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">初透。东篱把酒黄昏后，有暗香</text><text x="110" y="572" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">盈袖。莫道不销魂，帘卷西风，</text>
  <text x="110" y="640" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#8a6f5d">配图提示词</text>
  <text x="110" y="690" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">中国古代诗歌意境，盛开的花朵，五彩缤</text><text x="110" y="728" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">纷，儿童插画风格，温暖色调</text>
  <text x="110" y="795" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#9a8578">本地静态插画卡片 · GitHub Pages</text>
</svg>
