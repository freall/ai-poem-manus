      <stop offset="0%" stop-color="#8fd694"/>
      <stop offset="55%" stop-color="#e8f9c7"/>
      <stop offset="100%" stop-color="#fff7d6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1020" cy="150" r="130" fill="#ffffff" fill-opacity="0.28"/>
  <circle cx="170" cy="760" r="180" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="70" y="70" width="1060" height="760" rx="36" fill="#ffffff" fill-opacity="0.72"/>
  <rect x="110" y="110" width="210" height="56" rx="28" fill="#ffffff" fill-opacity="0.9"/>
  <text x="215" y="146" text-anchor="middle" font-size="26" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6b4f3a">春 · 惊蛰</text>
  <text x="110" y="255" font-size="78" font-weight="700" font-family="STKaiti, KaiTi, serif" fill="#3a2c24">观田家</text>
  <text x="110" y="320" font-size="34" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#7a5a46">韦应物 · 唐</text>
  <text x="110" y="410" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">微雨众卉新，一雷惊蛰始。田家</text><text x="110" y="464" font-size="38" font-family="STKaiti, KaiTi, serif" fill="#4f3d30">几日闲，耕种从此起。</text>
  <text x="110" y="640" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#8a6f5d">配图提示词</text>
  <text x="110" y="690" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">春天的景色，嫩绿的柳树，盛开的花朵，</text><text x="110" y="728" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">温暖的阳光，细雨蒙蒙，湿润的景象，儿</text><text x="110" y="766" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6d594b">童插画风格，柔和色调</text>
  <text x="110" y="795" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#9a8578">本地静态插画卡片 · GitHub Pages</text>
